<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Shrisha</title>
</head>
<body style="margin:0; padding:0;">

<!-- SHRISHA ADMIN LOGIN - ISOLATED -->
<div class="ss-auth-wrapper" id="shrishaAuth">
    <style>
        .ss-auth-wrapper {
            --ss-auth-bg: #0f0c29;
            --ss-auth-glass: rgba(255, 255, 255, 0.08);
            --ss-auth-border: rgba(255, 255, 255, 0.2);
            --ss-auth-text: #ffffff;
            --ss-auth-error: #ff6b6b;
            --ss-auth-accent: #e0c3fc;
            
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: 
                radial-gradient(circle at 20% 30%, rgba(147, 51, 234, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.4) 0%, transparent 50%),
                linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            background-size: 200% 200%;
            animation: ss-auth-bg 15s ease infinite;
            z-index: 9999;
        }

        @keyframes ss-auth-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .ss-auth-card {
            width: 90%;
            max-width: 420px;
            padding: 50px 40px;
            background: var(--ss-auth-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--ss-auth-border);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .ss-auth-avatar {
            width: 90px;
            height: 90px;
            margin: 0 auto 40px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .ss-auth-avatar svg {
            width: 50px;
            height: 50px;
            fill: rgba(255, 255, 255, 0.6);
        }

        .ss-auth-error {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: var(--ss-auth-error);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            display: none;
            margin-bottom: 20px;
            animation: ss-auth-shake 0.5s;
        }

        @keyframes ss-auth-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .ss-auth-input-wrap {
            position: relative;
            margin-bottom: 30px;
        }

        .ss-auth-icon {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.6);
        }

        .ss-auth-icon svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .ss-auth-input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            color: var(--ss-auth-text);
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        .ss-auth-input:focus {
            border-bottom-color: var(--ss-auth-accent);
        }

        .ss-auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.8), rgba(59, 130, 246, 0.8));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .ss-auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.4);
        }

        @media (max-width: 480px) {
            .ss-auth-card { padding: 40px 30px; border-radius: 30px; }
        }
    </style>

    <div class="ss-auth-card">
        <div class="ss-auth-avatar">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>

        <div class="ss-auth-error" id="ssAuthError">Invalid email or password!</div>

        <form onsubmit="ssAuthLogin(event)">
            <div class="ss-auth-input-wrap">
                <div class="ss-auth-icon">
                    <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <input type="email" class="ss-auth-input" id="ssAuthEmail" placeholder="Email ID" required>
            </div>

            <div class="ss-auth-input-wrap">
                <div class="ss-auth-icon">
                    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <input type="password" class="ss-auth-input" id="ssAuthPass" placeholder="Password" required>
            </div>

            <button type="submit" class="ss-auth-btn" id="ssAuthBtn">Login</button>
        </form>
    </div>

    <script>
        (function() {
            // Check if already logged in
            if(sessionStorage.getItem('ss_auth_token') === 'logged_in') {
                window.location.href = 'admin.html';
                return;
            }

            window.ssAuthLogin = function(e) {
                e.preventDefault();
                const email = document.getElementById('ssAuthEmail').value;
                const pass = document.getElementById('ssAuthPass').value;
                const errorDiv = document.getElementById('ssAuthError');
                const btn = document.getElementById('ssAuthBtn');

                // Demo credentials
                const VALID_EMAIL = "admin@shrisha.com";
                const VALID_PASS = "admin123";

                if(email === VALID_EMAIL && pass === VALID_PASS) {
                    // Success - Store session and redirect
                    sessionStorage.setItem('ss_auth_token', 'logged_in');
                    sessionStorage.setItem('ss_auth_user', email);
                    btn.textContent = "Redirecting...";
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 500);
                } else {
                    // Error
                    errorDiv.style.display = 'block';
                    document.getElementById('ssAuthPass').value = '';
                    setTimeout(() => {
                        errorDiv.style.display = 'none';
                    }, 3000);
                }
            };
        })();
    </script>
</div>

</body>
</html>

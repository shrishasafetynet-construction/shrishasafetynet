<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shrisha Admin Dashboard</title>

<link rel="stylesheet" href="admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div class="container">

<header>

<div>
<h1>SHRISHA ADMIN PANEL</h1>
<p>Lead Management Dashboard</p>
</div>

<button id="refreshBtn">
<i class="fa-solid fa-rotate"></i>
Refresh
</button>

</header>

<div class="stats">

<div class="card">
<h3>Total Leads</h3>
<h2 id="totalLeads">0</h2>
</div>

<div class="card">
<h3>Pending</h3>
<h2 id="pendingCount">0</h2>
</div>

<div class="card">
<h3>Contacted</h3>
<h2 id="contactedCount">0</h2>
</div>

<div class="card">
<h3>Confirmed</h3>
<h2 id="confirmedCount">0</h2>
</div>

</div>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search Name, Phone, Email">

</div>

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>Type</th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Service / Subject</th>
<th>Location / Message</th>
<th>Status</th>
<th>Date</th>
<th>Delete</th>

</tr>

</thead>

<tbody id="leadTable"></tbody>

</table>

</div>

</div>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Shrisha</title>
</head>
<body style="margin:0; padding:0; background:#0a0a0a; font-family:sans-serif;">

<!-- SHRISHA ADMIN PANEL LOGOUT - SEPARATE CODE -->
<div class="ss-admin-wrap" id="shrishaAdminPanel">
    <style>
        .ss-admin-wrap {
            --ss-admin-bg: #0a0a0a;
            --ss-admin-card: #1a1a1a;
            --ss-admin-text: #ffffff;
            --ss-admin-accent: #f97316;
            
            min-height: 100vh;
            background: var(--ss-admin-bg);
            color: var(--ss-admin-text);
            padding: 40px;
            box-sizing: border-box;
        }

        .ss-admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: var(--ss-admin-card);
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .ss-admin-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .ss-admin-user {
            color: #888;
            font-size: 14px;
        }

        /* SMALL LOGOUT BUTTON - As requested */
        .ss-logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ss-logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-1px);
        }

        .ss-logout-btn svg {
            width: 16px;
            height: 16px;
        }

        .ss-admin-content {
            background: var(--ss-admin-card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        @media (max-width: 768px) {
            .ss-admin-wrap { padding: 20px; }
            .ss-admin-header { flex-direction: column; gap: 20px; text-align: center; }
        }
    </style>

    <!-- Check Login Script (runs immediately) -->
    <script>
        (function() {
            // Redirect to login if not authenticated
            if(sessionStorage.getItem('ss_auth_token') !== 'logged_in') {
                window.location.href = 'login.html';
            }
        })();
    </script>

    <div class="ss-admin-header">
        <div>
            <h1 class="ss-admin-title">Admin Dashboard logout</h1>
            <div class="ss-admin-user" id="ssAdminUserDisplay">Loading...</div>
        </div>
        
        <!-- SMALL LOGOUT BUTTON -->
        <button class="ss-logout-btn" onclick="ssAdminLogout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Logout
        </button>
    </div>


    <!-- SEPARATE LOGOUT SCRIPT -->
    <script>
        (function() {
            // Display logged in user
            const user = sessionStorage.getItem('ss_auth_user') || 'Admin';
            document.getElementById('ssAdminUserDisplay').textContent = 'Logged in as: ' + user;

            // Logout Function - Separate from Login Code
            window.ssAdminLogout = function() {
                // Clear session
                sessionStorage.removeItem('ss_auth_token');
                sessionStorage.removeItem('ss_auth_user');
                
                // Redirect to login
                window.location.href = 'adminLOGIN.html';
            };

            console.log('Admin Logout Module Loaded');
        })();
    </script>
</div>

</body>
</html>
<script type="module" src="admin.js"></script>

</body>
</html>
